<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гид в Барселоне | Авторские экскурсии</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">BCN_GUIDE</div>
        <ul class="nav-links">
            <li>Экскурсии</li>
            <li>Обо мне</li>
            <li>Контакты</li>
        </ul>
    </nav>

    <section class="hero">
        <!-- Канвас для частиц -->
        <canvas id="trencadis-canvas"></canvas>
        
        <div class="hero-text">
            <h1 class="title">Барселона <br><span>мозаика впечатлений</span></h1>
            <p class="subtitle">Авторские погружения в культуру Гауди и скрытые дворики Готического квартала.</p>
            <div class="hero-info">
                ИНДИВИДУАЛЬНО • ГРУППЫ ДО 5 ЧЕЛОВЕК
            </div>
            <button class="btn">Начать путешествие</button>
        </div>
    </section>

    <!-- Секция со слайдером при скролле -->
    <section class="scroll-slider">
        <div class="slide-container">
            <div class="slide first" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1583422409516-2895a77efded?q=80&w=2070')">
                <div class="slide-content"><h2>Архитектура модерна</h2></div>
            </div>
            <div class="slide" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1511527661048-7fe73d85e9a4?q=80&w=2070')">
                <div class="slide-content"><h2>Секреты Саграда Фамилия</h2></div>
            </div>
            <div class="slide" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1523531294919-4bcd7c65e216?q=80&w=2070')">
                <div class="slide-content"><h2>Вкус Каталонии</h2></div>
            </div>
        </div>
    </section>

    <footer style="padding: 100px 0; text-align: center; background: #fff; position: relative; z-index: 10;">
        <p>© 2026 Авторские экскурсии в Барселоне</p>
    </footer>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
